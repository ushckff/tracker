<!doctype html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Frontend · Тренажёр</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --font:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    --display:'Space Grotesk',var(--font);
    --mono:ui-monospace,'SF Mono','JetBrains Mono',Menlo,monospace;
    --bg:#0d0f15; --bg2:#141821; --surface:#181d29; --card:#1c2230;
    --line:#272e3d; --line2:#323b4d;
    --text:#e9ecf3; --muted:#959db0; --faint:#727b8e;
    --accent:#7c6cff; --accent2:#33d6c6;
    --know:#3ecf8e; --recall:#f6b541; --dont:#f15c7f;
    --shadow:0 20px 50px -20px rgba(0,0,0,.7);
    --radius:18px;
  }
  [data-theme="light"]{
    --bg:#f3f4f8; --bg2:#eef0f6; --surface:#ffffff; --card:#ffffff;
    --line:#e6e9f0; --line2:#d8dce6;
    --text:#1a1f2b; --muted:#5c6678; --faint:#8a93a6;
    --shadow:0 20px 45px -22px rgba(31,41,75,.28);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--font);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;
    background:
      radial-gradient(900px 500px at 85% -10%,rgba(124,108,255,.16),transparent 60%),
      radial-gradient(700px 500px at 0% 0%,rgba(51,214,198,.10),transparent 55%),
      var(--bg);}
  .wrap{max-width:880px;margin:0 auto;padding:22px 18px 60px}
  button{user-select:none;-webkit-user-select:none}

  .top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px}
  .brand{display:flex;align-items:center;gap:11px;margin-right:auto}
  .logo{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    font-family:var(--display);font-weight:700;color:#fff;font-size:18px;box-shadow:0 6px 18px -6px var(--accent)}
  .brand h1{font-family:var(--display);font-size:18px;margin:0;letter-spacing:-.2px}
  .brand p{margin:0;font-size:12px;color:var(--muted)}
  .iconbtn{background:var(--surface);border:1px solid var(--line);color:var(--text);
    width:38px;height:38px;border-radius:11px;cursor:pointer;font-size:16px;display:grid;place-items:center;transition:.15s}
  .iconbtn:hover{border-color:var(--line2);transform:translateY(-1px)}
  .seg{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:11px;overflow:hidden}
  .seg button{background:transparent;border:0;color:var(--muted);padding:9px 15px;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font);transition:.15s}
  .seg button.on{background:var(--accent);color:#fff}

  .stats{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;margin-bottom:16px}
  .statrow{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:12px;flex-wrap:wrap}
  .mastery{font-family:var(--display);font-size:15px}
  .mastery b{font-size:22px;color:var(--accent2);margin-right:4px}
  .streak{display:flex;align-items:center;gap:7px;font-family:var(--display);font-size:14px;color:var(--muted)}
  .streak b{color:var(--recall);font-size:18px}
  .chips{display:flex;gap:7px;flex-wrap:wrap}
  .chip{font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;border:1px solid var(--line);display:inline-flex;align-items:center;gap:6px;color:var(--muted)}
  .dot{width:8px;height:8px;border-radius:50%}
  .d-know{background:var(--know)}.d-recall{background:var(--recall)}.d-dont{background:var(--dont)}
  .bar{height:10px;border-radius:6px;overflow:hidden;display:flex;background:var(--bg2);border:1px solid var(--line)}
  .bar i{display:block;height:100%;transition:width .3s}
  .bar .s-know{background:var(--know)}.bar .s-recall{background:var(--recall)}.bar .s-dont{background:var(--dont)}

  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
  .field{display:flex;flex-direction:column;gap:5px;flex:1;min-width:150px}
  .field label{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-family:var(--mono)}
  select{appearance:none;background:var(--surface);border:1px solid var(--line);color:var(--text);padding:10px 12px;border-radius:11px;font-size:13px;font-family:var(--font);cursor:pointer;width:100%}
  select:focus{outline:none;border-color:var(--accent)}

  /* мультиселект */
  .ms{position:relative}
  .ms-btn{width:100%;text-align:left;background:var(--surface);border:1px solid var(--line);color:var(--text);
    padding:10px 12px;border-radius:11px;font-size:13px;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .ms-btn:after{content:'▾';color:var(--faint);font-size:11px}
  .ms-btn.open{border-color:var(--accent)}
  .ms-panel{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:40;background:var(--card);border:1px solid var(--line2);
    border-radius:12px;box-shadow:var(--shadow);padding:6px;max-height:300px;overflow:auto;display:none}
  .ms-panel.open{display:block}
  .ms-actions{padding:2px 4px 8px}
  .ms-actions button{width:100%;font-size:11px;padding:7px;border-radius:8px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;font-family:var(--font)}
  .ms-actions button:hover{color:var(--text);border-color:var(--line2)}
  .ms-opt{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:8px;cursor:pointer;font-size:13px}
  .ms-opt:hover{background:var(--bg2)}
  .ms-opt input{accent-color:var(--accent);width:15px;height:15px;cursor:pointer}

  .stage{position:relative;perspective:1600px;margin-bottom:16px}
  .deck-edge{position:absolute;left:50%;top:10px;transform:translateX(-50%);height:30px;border-radius:16px;background:var(--card);border:1px solid var(--line);z-index:0}
  .deck-1{width:90%;top:-9px;opacity:.5}.deck-2{width:95%;top:-4px;opacity:.8}
  .card{position:relative;z-index:1;min-height:400px;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1)}
  .card.flipped{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    background:linear-gradient(180deg,var(--card),var(--surface));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;display:flex;flex-direction:column}
  .back{transform:rotateY(180deg)}
  .face-head{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.4px;color:var(--accent);font-weight:600}
  .level{margin-left:auto;font-size:11px;font-family:var(--mono);padding:3px 10px;border-radius:20px;border:1px solid;font-weight:600}
  .statustag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
  .front{user-select:none}
  .front .topic{font-family:var(--display);font-size:29px;line-height:1.18;margin:auto 0;font-weight:600;letter-spacing:-.4px}
  .front .hint{color:var(--faint);font-size:13px;margin-top:18px;display:flex;align-items:center;gap:8px}
  .kbd{font-family:var(--mono);font-size:11px;background:var(--bg2);border:1px solid var(--line2);border-radius:6px;padding:2px 7px;color:var(--muted)}
  .back .topic{font-family:var(--display);font-size:19px;font-weight:600;margin-bottom:14px;letter-spacing:-.2px}
  .back-cols{display:grid;grid-template-columns:1.05fr .95fr;gap:16px;flex:1;min-height:0}
  .back-col{display:flex;flex-direction:column;min-height:0}
  .col-q{border-left:1px solid var(--line);padding-left:16px}
  .back-col h4{margin:0 0 9px;font-family:var(--mono);font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--accent)}
  .col-q h4{color:var(--accent2)}
  .scroll{overflow:auto;flex:1;padding-right:4px}
  .scroll::-webkit-scrollbar{width:6px}
  .scroll::-webkit-scrollbar-thumb{background:var(--line2);border-radius:8px}
  .detail{font-size:14px;line-height:1.5;margin:0;padding-left:18px}
  .detail li{margin-bottom:8px}
  .detail li::marker{color:var(--accent)}
  .qs{font-size:13.5px;line-height:1.45;margin:0;padding-left:18px;color:var(--muted)}
  .qs li{margin-bottom:10px}
  .qs li::marker{color:var(--accent2);font-weight:700}

  .controls{display:flex;flex-direction:column;gap:12px}
  .draw{width:100%;padding:17px;border:0;border-radius:14px;cursor:pointer;color:#fff;font-size:16px;font-weight:600;font-family:var(--font);background:linear-gradient(135deg,var(--accent),#6a59f5);box-shadow:0 2px 10px -6px var(--accent);transition:.15s}
  .draw:hover{transform:translateY(-1px);box-shadow:0 4px 14px -8px var(--accent)}
  .draw:active{transform:translateY(0)}
  .rate{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .rate button{padding:14px 8px;border-radius:13px;cursor:pointer;font-weight:600;font-size:14px;font-family:var(--font);border:1px solid var(--line);background:var(--surface);color:var(--text);transition:.15s;display:flex;flex-direction:column;align-items:center;gap:3px}
  .rate button small{font-size:11px;color:var(--faint);font-family:var(--mono)}
  .rate button:hover{transform:translateY(-2px)}
  .rate .r-dont:hover{border-color:var(--dont)}
  .rate .r-recall:hover{border-color:var(--recall)}
  .rate .r-know:hover{border-color:var(--know)}
  .ghost{background:transparent;border:1px solid var(--line);color:var(--muted);padding:9px 14px;border-radius:11px;cursor:pointer;font-size:13px;font-family:var(--font);font-weight:600;transition:.15s}
  .ghost:hover{border-color:var(--line2);color:var(--text)}
  .empty{background:var(--surface);border:1px dashed var(--line2);border-radius:var(--radius);padding:40px 24px;text-align:center;color:var(--muted);min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
  .empty .big{font-family:var(--display);font-size:21px;color:var(--text)}

  .view{display:none}
  .view.on{display:flex;flex-direction:column;gap:16px}
  .grp{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  .grp h3{margin:0;padding:13px 16px;font-family:var(--display);font-size:14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line);cursor:pointer}
  .grp h3 .chev{display:inline-block;color:var(--faint);font-size:11px;transition:transform .3s ease}
  .grp.open h3 .chev{transform:rotate(90deg)}
  .grp h3 .count{margin-left:auto;font-size:11px;color:var(--faint);font-family:var(--mono);font-weight:400}
  .grp .rows{display:grid;grid-template-rows:0fr;transition:grid-template-rows .35s ease}
  .grp.open .rows{grid-template-rows:1fr}
  .grp .rows-inner{overflow:hidden}
  .row{display:flex;align-items:center;gap:11px;padding:11px 16px;border-top:1px solid var(--line);cursor:pointer;transition:.12s}
  .row:hover{background:var(--bg2)}
  .row .rdot{width:9px;height:9px;border-radius:50%;flex:none}
  .row .rtopic{font-size:13.5px;flex:1}
  .row .rlevel{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:10px;border:1px solid var(--line2)}

  footer{margin-top:26px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--card);border:1px solid var(--line2);color:var(--text);padding:11px 18px;border-radius:12px;font-size:13px;box-shadow:var(--shadow);transition:.25s;pointer-events:none;z-index:50}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media (max-width:560px){
    .front .topic{font-size:24px}.brand p{display:none}
    .back-cols{grid-template-columns:1fr;gap:14px}
    .col-q{border-left:0;border-top:1px solid var(--line);padding-left:0;padding-top:14px}
    .card,.empty{min-height:460px}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <div class="brand">
      <div class="logo">FE</div>
      <div><h1>Frontend · Тренажёр</h1><p>интервальное повторение по чеклисту</p></div>
    </div>
    <div class="seg" id="viewSeg">
      <button data-view="study" class="on">Карточки</button>
      <button data-view="browse">Список</button>
    </div>
    <button class="iconbtn" id="themeBtn" title="Тема">◐</button>
  </div>

  <div class="stats">
    <div class="statrow">
      <div class="mastery"><b id="mPct">0%</b><span style="color:var(--muted)">освоено</span></div>
      <div class="streak">🔥 <b id="streak">0</b> дней подряд</div>
      <div class="chips" id="chips"></div>
    </div>
    <div class="bar" id="bar"><i class="s-know"></i><i class="s-recall"></i><i class="s-dont"></i></div>
  </div>

  <div class="filters" id="filters">
    <div class="field"><label>Темы</label><div class="ms" id="msCat"></div></div>
    <div class="field"><label>Уровни</label><div class="ms" id="msLevel"></div></div>
    <div class="field"><label>Статус</label>
      <select id="fStatus">
        <option value="all">Все</option>
        <option value="dont">Не знаю</option>
        <option value="recall">Частично</option>
        <option value="know">Знаю</option>
      </select>
    </div>
  </div>

  <div class="view on" id="studyView">
    <div id="cardHost"></div>
    <div class="controls">
      <button class="draw" id="drawBtn">Выдать тему ↵</button>
      <div id="rateHost"></div>
    </div>
  </div>

  <div class="view" id="browseView"></div>

  <footer>
    <button class="ghost" id="exportBtn">Экспорт</button>
    <button class="ghost" id="importBtn">Импорт</button>
    <button class="ghost" id="resetBtn">Сбросить всё</button>
    <input type="file" id="fileInput" accept="application/json" hidden>
  </footer>
</div>
<div class="toast" id="toast"></div>

<script>
/* =========================================================
   КОЛОДА: [блок, тема, уровень, [что нужно знать], [вопросы для проверки]]

const RAW = [

const ORDER = ["HTML/CSS","JavaScript","TypeScript","React","Роутинг","State","Браузер","DevTools","Сеть/HTTP","Тулинг","Тесты","Performance","Безопасность","Принципы","Паттерны","Архитектура","Git/процессы","Прод","Алгоритмы"];
const LEVEL_ORDER = ["intern","junior","junior+","middle","middle+","senior"];
const CARDS = RAW.map((r,i)=>({id:i, cat:r[0], topic:r[1], level:r[2], detail:r[3], questions:r[4]}));

const STATUS = {
  dont:   {label:'Не знаю', weight:12, tag:'#f15c7f'},
  recall: {label:'Частично',weight:4,  tag:'#f6b541'},
  know:   {label:'Знаю',    weight:1,  tag:'#3ecf8e'},
};
const UNSEEN_WEIGHT = 10; // неоценённые карточки выпадают часто
const LEVELS = {'intern':'#8a93a6','junior':'#3ecf8e','junior+':'#33d6c6','middle':'#5b9bff','middle+':'#7c6cff','senior':'#f6b541'};
const KEY = 'fe_trainer_v5';

const Store = {
  async get(k){
    try{ if(window.storage){ const r=await window.storage.get(k); return r?r.value:null; } }catch(e){}
    try{ return localStorage.getItem(k); }catch(e){ return null; }
  },
  async set(k,v){
    try{ if(window.storage){ await window.storage.set(k,v); return; } }catch(e){}
    try{ localStorage.setItem(k,v); }catch(e){}
  }
};

let state = { status:{}, history:{}, filters:{cats:[],levels:[],status:'all'}, theme:'dark',
              current:null, flipped:false, lastId:null, view:'study' };
let msCat, msLevel;

const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const today = () => fmt(new Date());

async function load(){
  const raw = await Store.get(KEY);
  if(raw){ try{ Object.assign(state, JSON.parse(raw)); }catch(e){} }
  if(!state.filters) state.filters={};
  state.filters.cats = state.filters.cats||[];
  state.filters.levels = state.filters.levels||[];
  state.filters.status = state.filters.status||'all';
  document.documentElement.setAttribute('data-theme', state.theme||'dark');
  buildFilters();
  fStatus.value=state.filters.status;
  setView(state.view||'study', true);
  renderStats(); renderEmpty();
}
function save(){ Store.set(KEY, JSON.stringify(state)); }
function statusOf(id){ return state.status[id] || null; }
function weightOf(id){ const s=statusOf(id); return s?STATUS[s].weight:UNSEEN_WEIGHT; }

function pool(){
  const f=state.filters;
  return CARDS.filter(c=>{
    if(f.cats.length && !f.cats.includes(c.cat)) return false;
    if(f.levels.length && !f.levels.includes(c.level)) return false;
    if(f.status!=='all' && statusOf(c.id)!==f.status) return false;
    return true;
  });
}
function draw(){
  let p = pool();
  if(p.length===0){ renderEmpty(true); return; }
  if(p.length>1 && state.lastId!==null) p = p.filter(c=>c.id!==state.lastId);
  const total = p.reduce((s,c)=>s+weightOf(c.id),0);
  let roll = Math.random()*total, pick=p[0];
  for(const c of p){ roll -= weightOf(c.id); if(roll<=0){ pick=c; break; } }
  state.current=pick.id; state.lastId=pick.id; state.flipped=false;
  renderCard();
}
function rate(s){
  if(state.current===null) return;
  state.status[state.current]=s;
  const t=today(); state.history[t]=(state.history[t]||0)+1;
  save(); renderStats();
  if(state.view==='browse') renderBrowse();
  draw();
}

function levelBadge(c){ const col=LEVELS[c.level]; return `<span class="level" style="color:${col};border-color:${col}66">${c.level}</span>`; }

function renderCard(){
  const c = CARDS.find(x=>x.id===state.current);
  if(!c){ renderEmpty(); return; }
  const s=statusOf(c.id);
  const tag = s ? `<span class="statustag" style="color:${STATUS[s].tag};border:1px solid ${STATUS[s].tag}55">${STATUS[s].label}</span>` : '';
  const esc=v=>String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const detail = c.detail.map(b=>`<li>${esc(b)}</li>`).join('');
  const qs = c.questions.map(q=>`<li>${esc(q)}</li>`).join('');
  cardHost.innerHTML = `
    <div class="stage">
      <div class="deck-edge deck-1"></div><div class="deck-edge deck-2"></div>
      <div class="card ${state.flipped?'flipped':''}" id="theCard">
        <div class="face front">
          <div class="face-head"><span class="eyebrow">${c.cat}</span>${levelBadge(c)}</div>
          <div class="topic">${c.topic}</div>
          <div class="hint">
            ${tag}
            <span style="margin-left:auto">Раскрыть <span class="kbd">Space</span></span>
          </div>
        </div>
        <div class="face back">
          <div class="face-head"><span class="eyebrow">${c.cat}</span>${levelBadge(c)}</div>
          <div class="topic">${c.topic}</div>
          <div class="back-cols">
            <div class="back-col col-know"><h4>Что нужно знать</h4><div class="scroll"><ul class="detail">${detail}</ul></div></div>
            <div class="back-col col-q"><h4>Вопросы</h4><div class="scroll"><ol class="qs">${qs}</ol></div></div>
          </div>
        </div>
      </div>
    </div>`;
  document.getElementById('theCard').onclick = flip;
  drawBtn.textContent='Следующая →';
  renderRate();
}
function renderEmpty(noMatch){
  cardHost.innerHTML = `<div class="empty">
      <div class="big">${noMatch?'Под фильтры ничего не подходит':'Готов учиться?'}</div>
      <div>${noMatch?'Смягчи фильтры выше.':'Нажми «Выдать тему» — выпадет карточка. Что плохо знаешь, будет попадаться чаще.'}</div>
    </div>`;
  drawBtn.textContent='Выдать тему ↵'; rateHost.innerHTML='';
}
function flip(){
  if(state.current===null) return;
  state.flipped=!state.flipped;
  document.getElementById('theCard').classList.toggle('flipped',state.flipped);
  renderRate();
}
function renderRate(){
  if(state.current===null || !state.flipped){ rateHost.innerHTML=''; return; }
  rateHost.innerHTML = `<div class="rate">
      <button class="r-dont" data-s="dont">Не знаю<small>1</small></button>
      <button class="r-recall" data-s="recall">Частично<small>2</small></button>
      <button class="r-know" data-s="know">Знаю<small>3</small></button>
    </div>`;
  rateHost.querySelectorAll('button').forEach(b=> b.onclick=()=>rate(b.dataset.s));
}

function renderStats(){
  const c={dont:0,recall:0,know:0};
  CARDS.forEach(x=>{ const s=statusOf(x.id); if(s) c[s]++; });
  const total=CARDS.length;
  mPct.textContent=Math.round(c.know/total*100)+'%';
  const seg=bar.querySelectorAll('i');
  seg[0].style.width=c.know/total*100+'%';
  seg[1].style.width=c.recall/total*100+'%';
  seg[2].style.width=c.dont/total*100+'%';
  chips.innerHTML=[['d-know','Знаю',c.know],['d-recall','Частично',c.recall],['d-dont','Не знаю',c.dont]]
    .map(([cl,l,n])=>`<span class="chip"><span class="dot ${cl}"></span>${l} ${n}</span>`).join('');
  document.getElementById('streak').textContent=currentStreak();
}
function currentStreak(){
  let s=0; const d=new Date();
  if(!state.history[fmt(d)]){ d.setDate(d.getDate()-1); if(!state.history[fmt(d)]) return 0; }
  while(state.history[fmt(d)]){ s++; d.setDate(d.getDate()-1); }
  return s;
}

/* ----- мультиселект ----- */
function makeMulti(host, options, allLabel, onChange){
  let sel=[];
  const labelOf=v=>(options.find(o=>o.value===v)||{}).label||v;
  const btn=document.createElement('button'); btn.type='button'; btn.className='ms-btn';
  const panel=document.createElement('div'); panel.className='ms-panel';
  panel.innerHTML=`<div class="ms-actions"><button type="button" data-act="none">Сбросить</button></div>`+
    options.map(o=>`<label class="ms-opt"><input type="checkbox" value="${o.value}"><span>${o.label}</span></label>`).join('');
  host.appendChild(btn); host.appendChild(panel);
  function summary(){ btn.textContent = sel.length===0?allLabel : sel.length===1?labelOf(sel[0]) : sel.length+' выбрано'; }
  btn.onclick=e=>{ e.stopPropagation(); const open=panel.classList.contains('open'); closeAllMs(); if(!open){ panel.classList.add('open'); btn.classList.add('open'); } };
  panel.onclick=e=>e.stopPropagation();
  panel.querySelector('[data-act="none"]').onclick=()=>{ sel=[]; panel.querySelectorAll('input').forEach(i=>i.checked=false); summary(); onChange(sel.slice()); };
  panel.querySelectorAll('input').forEach(inp=> inp.onchange=()=>{
    sel=[...panel.querySelectorAll('input:checked')].map(i=>i.value); summary(); onChange(sel.slice());
  });
  return { set(arr){ sel=(arr||[]).slice(); panel.querySelectorAll('input').forEach(i=>i.checked=sel.includes(i.value)); summary(); } };
}
function closeAllMs(){
  document.querySelectorAll('.ms-panel.open').forEach(p=>p.classList.remove('open'));
  document.querySelectorAll('.ms-btn.open').forEach(b=>b.classList.remove('open'));
}
document.addEventListener('click', closeAllMs);

function buildFilters(){
  const cats=ORDER.filter(cat=>CARDS.some(c=>c.cat===cat))
    .map(cat=>({value:cat,label:`${cat} (${CARDS.filter(c=>c.cat===cat).length})`}));
  msCat = makeMulti(document.getElementById('msCat'), cats, `Все темы (${CARDS.length})`,
    sel=>{ state.filters.cats=sel; save(); renderEmpty(); });
  msLevel = makeMulti(document.getElementById('msLevel'), LEVEL_ORDER.map(l=>({value:l,label:l})), 'Все уровни',
    sel=>{ state.filters.levels=sel; save(); renderEmpty(); });
  msCat.set(state.filters.cats); msLevel.set(state.filters.levels);
}

function renderBrowse(){
  browseView.innerHTML = ORDER.filter(cat=>CARDS.some(c=>c.cat===cat)).map(cat=>{
    const items=CARDS.filter(c=>c.cat===cat).slice()
      .sort((a,b)=>LEVEL_ORDER.indexOf(a.level)-LEVEL_ORDER.indexOf(b.level));
    const known=items.filter(c=>statusOf(c.id)==='know').length;
    const rows=items.map(c=>{
      const col=LEVELS[c.level], s=statusOf(c.id), dot=s?STATUS[s].tag:'#3a4254';
      return `<div class="row" data-id="${c.id}">
        <span class="rdot" style="background:${dot}"></span>
        <span class="rtopic">${c.topic}</span>
        <span class="rlevel" style="color:${col};border-color:${col}55">${c.level}</span></div>`;
    }).join('');
    return `<div class="grp"><h3><span class="chev">▸</span>${cat}<span class="count">${known}/${items.length} знаю</span></h3>
      <div class="rows"><div class="rows-inner">${rows}</div></div></div>`;
  }).join('');
  browseView.querySelectorAll('.grp h3').forEach(h=> h.onclick=()=>h.parentElement.classList.toggle('open'));
  browseView.querySelectorAll('.row').forEach(r=> r.onclick=()=>{
    state.current=+r.dataset.id; state.lastId=state.current; state.flipped=false;
    setView('study'); renderCard(); flip();
  });
}

function setView(v, silent){
  state.view=v; if(!silent) save();
  studyView.classList.toggle('on',v==='study');
  browseView.classList.toggle('on',v==='browse');
  filters.style.display = v==='study' ? 'flex' : 'none';   // фильтры только на экране карточек
  viewSeg.querySelectorAll('button').forEach(b=>b.classList.toggle('on',b.dataset.view===v));
  if(v==='browse') renderBrowse();
}

let toastT;
function toast(msg){ toast_.textContent=msg; toast_.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>toast_.classList.remove('show'),1800); }

const cardHost=document.getElementById('cardHost'), rateHost=document.getElementById('rateHost'),
  drawBtn=document.getElementById('drawBtn'), mPct=document.getElementById('mPct'), bar=document.getElementById('bar'),
  chips=document.getElementById('chips'), fStatus=document.getElementById('fStatus'),
  filters=document.getElementById('filters'),
  studyView=document.getElementById('studyView'), browseView=document.getElementById('browseView'),
  viewSeg=document.getElementById('viewSeg'), toast_=document.getElementById('toast');

drawBtn.onclick=draw;
fStatus.onchange=()=>{state.filters.status=fStatus.value;save();renderEmpty();};
viewSeg.querySelectorAll('button').forEach(b=> b.onclick=()=>setView(b.dataset.view));
document.getElementById('themeBtn').onclick=()=>{
  state.theme=state.theme==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',state.theme); save();
};
document.getElementById('resetBtn').onclick=()=>{
  if(confirm('Сбросить весь прогресс и историю? Это нельзя отменить.')){
    state.status={}; state.history={}; state.current=null; state.flipped=false; save();
    renderStats(); renderEmpty(); if(state.view==='browse') renderBrowse(); toast('Сброшено');
  }
};
document.getElementById('exportBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify({status:state.status,history:state.history},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='frontend-trainer-progress.json'; a.click(); toast('Прогресс выгружен');
};
const fileInput=document.getElementById('fileInput');
document.getElementById('importBtn').onclick=()=>fileInput.click();
fileInput.onchange=e=>{
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{ const d=JSON.parse(rd.result);
    if(d.status) state.status=d.status; if(d.history) state.history=d.history;
    save(); renderStats(); if(state.view==='browse') renderBrowse(); toast('Прогресс загружен');
  }catch(err){ toast('Не удалось прочитать файл'); } };
  rd.readAsText(f); fileInput.value='';
};

document.addEventListener('keydown',e=>{
  if(['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName)) return;
  if(e.code==='Space'){ e.preventDefault();
    if(state.current===null) draw(); else if(!state.flipped) flip(); else draw();
  }
  if(e.code==='Enter'){ e.preventDefault(); draw(); }
  if(state.flipped && state.current!==null){
    if(e.key==='1') rate('dont'); if(e.key==='2') rate('recall'); if(e.key==='3') rate('know');
  }
});

load();
</script>
